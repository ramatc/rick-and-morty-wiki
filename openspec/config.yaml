schema: spec-driven

context: |
  Tech stack: React 18.2 + Vite 4 (@vitejs/plugin-react), plain JavaScript (JSX, no TypeScript despite @types/react devDeps)
  Routing: react-router-dom 6.6.2
  Other libs: react-paginate, just-debounce-it (search debounce)
  Data source: rickandmortyapi.com via src/services/
  Architecture: src/components/{Name}/index.jsx + styles.css (co-located), src/pages/, src/services/ for API calls
  Testing: none (no jest/vitest, no test files, no test script)
  Style: plain CSS per component, no CSS-in-JS/Tailwind, no formatter; "standard" (JS Standard Style) present as devDependency but not wired to a script
  Notes: ~2 year old project, README in Spanish, no state management library

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: false
    test_command: ""
  verify:
    test_command: ""
    build_command: "npm run build"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
